  /v2/verify/similarity/{chainId}/{address}:
    post:
      tags:
      - Verify Contracts
      summary: Verify contract via similarity search
      description: 'Starts a verification job that searches the Sourcify database for contracts whose

        runtime bytecode is similar to the contract deployed at the given address. The job will

        attempt to verify against each candidate until a match is found or the candidate list is exhausted.

        '
      operationId: verify-similarity
      parameters:
      - name: chainId
        in: path
        description: The chainId number of the EVM chain
        required: true
        schema:
          type: string
          pattern: ^\d+$
          minLength: 1
          maxLength: 20
          example: '11155111'
      - name: address
        in: path
        description: Contract's 20 byte address in hex string with the 0x prefix. Case insensitive.
        required: true
        schema:
          type: string
          pattern: (\b0x[a-fA-F0-9]{40}\b)
          minLength: 42
          maxLength: 42
          example: '0x2738d13E81e30bC615766A0410e7cF199FD59A83'
      requestBody:
        description: ''
        content:
          application/json:
            schema:
              type: object
              properties:
                creationTransactionHash:
                  allOf:
                  - type: string
                    title: Keccak256
                    pattern: (\b0x[a-f0-9]{64}\b)
                    example: '0xb6ee9d528b336942dd70d3b41e2811be10a473776352009fd73f85604f5ed206'
                  - description: The hash of the transaction that created this contract. Optional.
      responses:
        '202':
          description: "Successfully submitted the verification. The server started to process the verification. \n\nYou can follow the verification status via the returned `verificationId` at `GET /v2/verify/{verificationId}`"
          content:
            application/json:
              schema:
                type: object
                title: VerificationJob
                properties:
                  verificationId:
                    type: string
                    format: uuid
                required:
                - verificationId
        '400':
          description: Bad request from the client
          content:
            application/json:
              schema:
                type: object
                title: GenericErrorResponse
                properties:
                  customCode:
                    type: string
                    description: A string token to indicate the reason of the error
                    example: unsupported_chain
                  message:
                    type: string
                    description: The reasoning of the error
                    example: The chain with chainId 3153212 is not supported for verification
                  errorId:
                    type: string
                    format: uuid
                required:
                - customCode
                - message
