      operationId: verify-metadata
      parameters:
      - name: chainId
        in: path
        description: The chainId number of the EVM chain
        required: true
        schema:
          type: string
          pattern: ^\d+$
          minLength: 1
          maxLength: 20
          example: '11155111'
      - name: address
        in: path
        description: Contract's 20 byte address in hex string with the 0x prefix. Case insensitive.
        required: true
        schema:
          type: string
          pattern: (\b0x[a-fA-F0-9]{40}\b)
          minLength: 42
          maxLength: 42
          example: '0x2738d13E81e30bC615766A0410e7cF199FD59A83'
      requestBody:
        description: ''
        content:
          application/json:
            schema:
              type: object
              properties:
                sources:
                  type: object
                  description: A mapping from file path to its content.
                  additionalProperties:
                    type: string
                metadata:
                  type: object
                  description: The [metadata](https://docs.soliditylang.org/en/latest/metadata.html) as an object.
                creationTransactionHash:
                  allOf:
                  - type: string
                    title: Keccak256
                    pattern: (\b0x[a-f0-9]{64}\b)
                    example: '0xb6ee9d528b336942dd70d3b41e2811be10a473776352009fd73f85604f5ed206'
                  - description: The hash of the transaction that created this contract. Optional.
              required:
              - sources
              - metadata
            examples:
              Example 1:
                value:
                  sources:
                    contracts/Storage.sol: "// SPDX-License-Identifier: MIT\npragma solidity ^0.8.0;\n\ncontract Storage {\n    uint256 number;\n\n    function setNumber(uint256 newNumber) public {\n        number = newNumber;\n    }\n\n    function getNumber() public view returns (uint256) {\n        return number;\n    }\n}\n"
                    contracts/Owner.sol: "// SPDX-License-Identifier: MIT\npragma solidity ^0.8.0;\n\ncontract Owner {\n    address public owner;\n\n    constructor() {\n        owner = msg.sender;\n    }\n}\n"
                  metadata: {}
