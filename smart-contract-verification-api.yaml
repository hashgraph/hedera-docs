      summary: Health check endpoint
      description: Returns server health status
      tags:
      - Other
      responses:
        '200':
          description: Server is healthy
          content:
            text/plain:
              schema:
                type: string
                example: Alive and kicking!
  /version:
    get:
      summary: Get version information
      description: Returns version information for the server and its dependencies, along with the git commit hash
      tags:
      - Other
      responses:
        '200':
          description: Version information
          content:
            application/json:
              schema:
                type: object
                properties:
                  sourcifyServerVersion:
                    type: string
                    description: Version of the Sourcify server
                    example: 3.6.1
                  libSourcifyVersion:
                    type: string
                    description: Version of @ethereum-sourcify/lib-sourcify
                    example: ^3.0.2
                  sourcifyCompilersVersion:
                    type: string
                    description: Version of @ethereum-sourcify/compilers
                    example: ^1.0.12
                  bytecodeUtilsVersion:
                    type: string
                    description: Version of @ethereum-sourcify/bytecode-utils
                    example: ^1.3.15
                  gitCommitHash:
                    type: string
                    description: Git commit hash the server was built from
                    example: 755c0fcf1a2b3c4d5e6f7890abcdef1234567890
  /chains:
    get:
      summary: Get the list of supported and deprecated chains
      tags:
      - Other
      responses:
        '200':
          description: List of supported chains
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      description: Chain name
                      example: Ethereum Mainnet
                    title:
                      type: string
                      description: Chain title (optional)
                      example: Ethereum Mainnet
                    chainId:
                      type: integer
                      description: Chain ID
                      example: 1
                    rpc:
                      type: array
                      items:
                        type: string
                      description: List of RPC endpoints
                      example:
                      - https://rpc.mainnet.ethpandaops.io
                    traceSupportedRPCs:
                      type: array
                      items:
                        type: object
                        properties:
                          type:
                            type: string
                            description: Type of trace support
                            example: trace_transaction
                          index:
                            type: integer
                            description: Index of the RPC in the rpc array
                            example: 0
                      description: RPCs that support tracing
                    supported:
                      type: boolean
                      description: Whether the chain is supported for verification
                      example: true
                    etherscanAPI:
                      type: boolean
                      description: Whether Etherscan API is available for this chain
                      example: true
                  required:
                  - name
                  - chainId
                  - rpc
                  - traceSupportedRPCs
                  - supported
                  - etherscanAPI
