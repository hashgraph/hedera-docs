  /v2/verify/etherscan/{chainId}/{address}:
    post:
      tags:
      - Verify Contracts
      summary: Import from Etherscan
      description: Import a contract verified on an Etherscan instance or a service with Etherscan-alike API
      operationId: import-from-etherscan
      parameters:
      - name: chainId
        in: path
        description: The chainId number of the EVM chain
        required: true
        schema:
          type: string
          pattern: ^\d+$
          minLength: 1
          maxLength: 20
          example: '11155111'
      - name: address
        in: path
        description: Contract's 20 byte address in hex string with the 0x prefix. Case insensitive.
        required: true
        schema:
          type: string
          pattern: (\b0x[a-fA-F0-9]{40}\b)
          minLength: 42
          maxLength: 42
          example: '0x2738d13E81e30bC615766A0410e7cF199FD59A83'
      requestBody:
        description: ''
        content:
          application/json:
            schema:
              type: object
              properties:
                apiKey:
                  type: string
                  description: API key to use when importing from the Etherscan instance or Etherscan-alike API.
      responses:
        '202':
          description: "Successfully submitted the verification. The server started to process the verification. \n\nYou can follow the verification status via the returned `verificationId` at `GET /v2/verify/{verificationId}`"
          content:
            application/json:
              schema:
                type: object
                title: VerificationJob
                properties:
                  verificationId:
                    type: string
                    format: uuid
                required:
                - verificationId
        '400':
          description: Bad request from the client
          content:
            application/json:
              schema:
                type: object
                title: GenericErrorResponse
                properties:
                  customCode:
                    type: string
                    description: A string token to indicate the reason of the error
                    example: unsupported_chain
                  message:
                    type: string
                    description: The reasoning of the error
                    example: The chain with chainId 3153212 is not supported for verification
                  errorId:
                    type: string
                    format: uuid
                required:
                - customCode
                - message
                - errorId
                examples:
                - customCode: unsupported_chain
                  message: The chain with chainId 9429413 is not supported
                  errorId: 1ac6b91a-0605-4459-93dc-18f210a70192
              examples:
                Example 1:
                  value:
                    customCode: unsupported_chain
                    message: The chain with chainId 9429413 is not supported
                    errorId: 1ac6b91a-0605-4459-93dc-18f210a70192
        '429':
          description: You've reached the API key limit for the Etherscan key.
          content:
            application/json:
              schema:
                type: object
                title: GenericErrorResponse
                properties:
                  customCode:
                    type: string
                    description: A string token to indicate the reason of the error
                    example: unsupported_chain
                  message:
                    type: string
                    description: The reasoning of the error
                    example: The chain with chainId 3153212 is not supported for verification
                  errorId:
                    type: string
                    format: uuid
                required:
                - customCode
                - message
                - errorId
                examples:
                - customCode: unsupported_chain
                  message: The chain with chainId 9429413 is not supported
                  errorId: 1ac6b91a-0605-4459-93dc-18f210a70192
              examples:
                Example 1:
                  value:
                    customCode: etherscan_limit
                    message: Etherscan API key limit reached
                    errorId: 1ac6b91a-0605-4459-93dc-18f210a70192
        '500':
          description: ''
          content:
            application/json:
              schema:
                type: object
                title: GenericErrorResponse
                properties:
                  customCode:
                    type: string
                    description: A string token to indicate the reason of the error
                    example: unsupported_chain
                  message:
                    type: string
                    description: The reasoning of the error
                    example: The chain with chainId 3153212 is not supported for verification
                  errorId:
                    type: string
                    format: uuid
                required:
                - customCode
                - message
                - errorId
                examples:
                - customCode: unsupported_chain
                  message: The chain with chainId 9429413 is not supported
                  errorId: 1ac6b91a-0605-4459-93dc-18f210a70192
              examples:
                Example 1:
                  value:
